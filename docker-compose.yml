name: confluence

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: veloxico/wikso-be:local
    ports:
      - '3000:3000'
      - '1234:1234'
    environment:
      PORT: 3000
      NODE_ENV: production
      # DATABASE_URL is deliberately NOT set — configured via setup wizard
      # and persisted to /app/data/wikso.config.json on the wikso_data volume.
      # Docker Compose default (postgresql://postgres:password@postgres:5432/wikso)
      # is suggested as a placeholder in the wizard UI.
      # SECRETS — must be set in your .env (or environment) before `docker compose up`.
      # Compose's `${VAR:?msg}` syntax aborts the start with a clear error if
      # they're missing, so you can never accidentally boot with a guessable key.
      # Generate strong values with:  openssl rand -hex 32
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set (run: openssl rand -hex 32)}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set (run: openssl rand -hex 32)}"
      # ENCRYPTION_KEY is optional but strongly recommended. If unset the app
      # falls back to JWT_SECRET (with a startup warning). Setting a separate
      # key lets you rotate JWT_SECRET without invalidating encrypted data
      # at rest (OAuth tokens, AI keys, Slack workspace tokens, SMTP config).
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      # Comma-separated hostnames the SSRF guard should trust as internal
      # services (e.g. when the admin AI endpoint points at another container
      # in the same compose). Default empty = strict block.
      SSRF_ALLOWED_HOSTS: "${SSRF_ALLOWED_HOSTS:-}"
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      EMAIL_VERIFICATION_REQUIRED: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_PORT: 9000
      S3_USE_SSL: 'false'
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: wikso-uploads
      S3_REGION: us-east-1
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: masterKey
      HOCUSPOCUS_PORT: 1234
      MAIL_HOST: smtp.example.com
      MAIL_PORT: 587
      MAIL_USER: user
      MAIL_PASS: pass
      MAIL_FROM: noreply@wikso.local
      FRONTEND_URL: http://localhost:3001
      GOOGLE_CLIENT_ID: ''
      GOOGLE_CLIENT_SECRET: ''
      GITHUB_CLIENT_ID: ''
      GITHUB_CLIENT_SECRET: ''
      # SAML SSO (leave empty to disable)
      SAML_ENTRY_POINT: ''
      SAML_ISSUER: 'wikso'
      SAML_CERT: ''
      SAML_CALLBACK_URL: 'http://localhost:3000/api/v1/auth/saml/callback'
      # Slack integration (leave empty to disable)
      SLACK_CLIENT_ID: ''
      SLACK_CLIENT_SECRET: ''
      SLACK_SIGNING_SECRET: ''
      SLACK_REDIRECT_URL: 'http://localhost:3000/api/v1/integrations/slack/oauth/callback'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    volumes:
      - wikso_data:/app/data
    networks:
      - wiki-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    image: veloxico/wikso-fe:local
    ports:
      - '3001:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=ws://localhost:1234
      - WS_PUBLIC_URL=ws://localhost:1234
      - API_INTERNAL_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wiki-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wikso
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --stop-writes-on-bgsave-error no
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - '9002:9000'
      - '9003:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilidata:
  wikso_data:

networks:
  wiki-net:
    driver: bridge
