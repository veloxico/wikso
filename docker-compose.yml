services:
  backend:
    image: veloxico/wikso-be:latest
    ports:
      - '3000:3000'
      - '1234:1234'
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/wikso
      JWT_SECRET: super-secret-key-change-me-in-production
      JWT_REFRESH_SECRET: refresh-secret-change-me-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      EMAIL_VERIFICATION_REQUIRED: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_PORT: 9000
      S3_USE_SSL: 'false'
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: wikso-uploads
      S3_REGION: us-east-1
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: masterKey
      HOCUSPOCUS_PORT: 1234
      MAIL_HOST: smtp.example.com
      MAIL_PORT: 587
      MAIL_USER: user
      MAIL_PASS: pass
      MAIL_FROM: noreply@wikso.local
      FRONTEND_URL: http://localhost:3001
      GOOGLE_CLIENT_ID: ''
      GOOGLE_CLIENT_SECRET: ''
      GITHUB_CLIENT_ID: ''
      GITHUB_CLIENT_SECRET: ''
      # SAML SSO (leave empty to disable)
      SAML_ENTRY_POINT: ''
      SAML_ISSUER: 'wikso'
      SAML_CERT: ''
      SAML_CALLBACK_URL: 'http://localhost:3000/api/v1/auth/saml/callback'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - wiki-net
    restart: unless-stopped

  frontend:
    image: veloxico/wikso-fe:latest
    ports:
      - '3001:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=ws://localhost:1234
      - WS_PUBLIC_URL=ws://localhost:1234
      - API_INTERNAL_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wiki-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wikso
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --stop-writes-on-bgsave-error no
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: masterKey
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  meilidata:

networks:
  wiki-net:
    driver: bridge
