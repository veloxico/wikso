<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!--
    Procedural grain — tiled over the entire viewport by globals.css to
    add atmospheric texture without shipping a raster PNG. Seed is
    fixed so the texture is deterministic, numOctaves=2 keeps the
    grain fine rather than clumpy, and feColorMatrix desaturates the
    turbulence output to monochrome dots.
  -->
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" stitchTiles="stitch"/>
    <feColorMatrix type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.9 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>
